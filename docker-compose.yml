services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smartenergy
      POSTGRES_PASSWORD: smartenergy
      POSTGRES_DB: smartenergy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartenergy"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://smartenergy:smartenergy@postgres:5432/smartenergy
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-change-in-production
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - ./ml:/ml

volumes:
  postgres_data:
